name: Vigilante Pastillero
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
jobs:
  avisar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install firebase-admin
      - name: Ejecutar vigilante
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SA }}
        run: python vigilante.py
